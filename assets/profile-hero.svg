    <rect width="408" height="136" rx="28" fill="url(#card)" stroke="#D7E7F7" stroke-opacity="0.12"/>
    <text x="32" y="42" fill="#8CB7D8" font-family="Avenir Next, Segoe UI, sans-serif" font-size="16" letter-spacing="2.4">BASELINE</text>
    <text x="32" y="80" fill="#F6F0E3" font-family="Avenir Next, Segoe UI, sans-serif" font-size="26" font-weight="700">Moscow / UTC+3</text>
    <text x="32" y="110" fill="#F6F0E3" font-family="Avenir Next, Segoe UI, sans-serif" font-size="26" font-weight="700">Open to collaboration</text>
    <text x="32" y="130" fill="#D7E7F7" font-family="Avenir Next, Segoe UI, sans-serif" font-size="18">Telegram: t.me/whiterage88</text>
