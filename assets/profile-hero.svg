  <text x="74" y="576" fill="#8CB7D8" font-family="Avenir Next, Segoe UI, sans-serif" font-size="18" letter-spacing="2.4">GO SERVICES / CLEAR INTERFACES / MEASURED PERFORMANCE</text>
